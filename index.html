<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends in Tokyo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #F7F7F5; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-card { background: #F7F7F5; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 10; padding: 24px 20px; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border-radius: 20px; }
        .tab-btn.active { background-color: #FF6B35; color: white; }
        .date-btn.active { background-color: #FF6B35; color: white; box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="max-w-[500px] mx-auto min-h-screen relative shadow-2xl">
        <div class="relative h-[250px] w-full overflow-hidden">
            <img src="Tokyo trip web banner.png" class="w-full h-full object-cover">
            <div class="absolute bottom-12 right-4 flex gap-2 glass p-2 shadow-xl border border-white/50">
                <button onclick="showTab('plan')" id="btn-plan" class="tab-btn active p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="map"></i></button>
                <button onclick="showTab('info')" id="btn-info" class="tab-btn p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="info"></i></button>
                <button onclick="showTab('shop')" id="btn-shop" class="tab-btn p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="shopping-basket"></i></button>
                <button onclick="showTab('money')" id="btn-money" class="tab-btn p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="banknote"></i></button>
            </div>
        </div>

        <main class="main-card shadow-inner">
            <div id="content-plan" class="tab-content">
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl mb-6 shadow-sm border border-gray-100">
                    <div class="flex items-center text-gray-700 font-bold"><i data-lucide="sun" class="text-yellow-400 mr-2"></i> Tokyo</div>
                    <span class="text-2xl font-light">18°C</span>
                </div>

                <div class="flex overflow-x-auto gap-4 mb-8 hide-scroll py-1">
                    <button onclick="filterDate('4/21')" class="date-btn active flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-421"><span class="text-[10px] font-bold">MON</span><span class="text-xl font-black">21</span></button>
                    <button onclick="filterDate('4/22')" class="date-btn flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-422"><span class="text-[10px] font-bold">TUE</span><span class="text-xl font-black">22</span></button>
                    <button onclick="filterDate('4/23')" class="date-btn flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-423"><span class="text-[10px] font-bold">WED</span><span class="text-xl font-black">23</span></button>
                    <button onclick="filterDate('4/24')" class="date-btn flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-424"><span class="text-[10px] font-bold">THU</span><span class="text-xl font-black">24</span></button>
                    <button onclick="filterDate('4/25')" class="date-btn flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-425"><span class="text-[10px] font-bold">FRI</span><span class="text-xl font-black">25</span></button>
                    <button onclick="filterDate('4/26')" class="date-btn flex-shrink-0 w-14 h-20 rounded-2xl bg-white text-gray-400 flex flex-col items-center justify-center border border-gray-50 transition-all" id="d-426"><span class="text-[10px] font-bold">SAT</span><span class="text-xl font-black">26</span></button>
                </div>
                
                <div id="itinerary-list" class="space-y-4">
                    </div>
            </div>

            <div id="content-info" class="tab-content hidden space-y-4">
                <div class="bg-[#D1E8ED] p-6 rounded-[2rem]">
                    <div class="font-black text-blue-900 mb-2 text-sm uppercase">匯率換算 (0.21)</div>
                    <input type="number" id="jpyInput" oninput="convertCurrency()" placeholder="輸入日幣金額" class="w-full p-4 rounded-2xl border-none text-xl font-bold shadow-sm">
                    <div id="twdResult" class="text-center font-black text-3xl text-blue-900 mt-4">TWD $ 0</div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                    <h2 class="font-bold text-lg mb-2 text-gray-800">KOMACHI 住宿資訊</h2>
                    <p class="text-sm text-gray-500 mb-4">5 Chome-9-3 Higashinippori, Tokyo</p>
                    <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=KOMACHI+Tokyo+Higashinippori')" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-sm">地圖導航</button>
                </div>
            </div>

            <div id="content-shop" class="tab-content hidden py-20 text-center text-gray-300"><i data-lucide="shopping-bag" class="mx-auto mb-2"></i><p>購物清單</p></div>
            <div id="content-money" class="tab-content hidden py-20 text-center text-gray-300"><i data-lucide="coins" class="mx-auto mb-2"></i><p>花費記錄</p></div>
        </main>

        <button class="fixed bottom-6 right-6 w-14 h-14 bg-[#FF6B35] text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <script>
        // 資料庫：請在此處增加行程
        const tripData = {
            '4/21': [
                { type: 'flight', from: 'TPE', to: 'NRT', time1: '13:00', time2: '17:15', note: 'CX450 | 國泰航空' },
                { type: 'normal', cat: '住宿', name: 'KOMACHI Check-in', time: '18:30', note: '5 Chome-9-3 Higashinippori' }
            ],
            '4/22': [{ type: 'normal', cat: '行程', name: '東京市區探索', time: '10:00', note: '自由活動' }],
            '4/23': [{ type: 'normal', cat: '景點', name: '秩父郊外行程', time: '08:30', note: '近郊秩父一日遊' }],
            '4/24': [
                { type: 'normal', cat: '美食', name: 'Den Kushi Flori (午餐)', time: '12:00', note: '預約人: Elmo, Potato, Avon', addr: 'Tokyo, Shibuya, Jingumae, 5 Chome-46-7' }
            ],
            '4/25': [{ type: 'normal', cat: '行程', name: '最後衝刺購物', time: '14:00', note: '藥妝與伴手禮' }],
            '4/26': [{ type: 'normal', cat: '行程', name: '準備回程', time: '10:00', note: '整理行李' }]
        };

        function filterDate(date) {
            // 切換按鈕樣式
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d-' + date.replace('/', '')).classList.add('active');

            // 渲染內容
            const list = document.getElementById('itinerary-list');
            list.innerHTML = '';
            
            if (tripData[date]) {
                tripData[date].forEach(item => {
                    if (item.type === 'flight') {
                        list.innerHTML += `
                            <div class="bg-slate-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden mb-4">
                                <div class="flex justify-between items-center">
                                    <div class="text-center"><div class="text-3xl font-black">${item.from}</div><div class="text-xs opacity-50">${item.time1}</div></div>
                                    <i data-lucide="plane" class="text-[#FF6B35]"></i>
                                    <div class="text-center"><div class="text-3xl font-black">${item.to}</div><div class="text-xs opacity-50">${item.time2}</div></div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-white/10 text-[10px] opacity-60 uppercase">${item.note}</div>
                            </div>`;
                    } else {
                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.addr || item.name)}')">
                                <div class="flex justify-between mb-1">
                                    <span class="text-[10px] bg-[#E8F0E6] text-[#4A5D4E] px-2 py-1 rounded font-black">${item.cat}</span>
                                    <span class="text-xs text-gray-400">${item.time}</span>
                                </div>
                                <h3 class="font-bold text-lg text-gray-800">${item.name}</h3>
                                <p class="text-xs text-gray-400 mt-1">${item.note}</p>
                                <div class="mt-3 text-blue-500 text-[10px] font-bold flex items-center"><i data-lucide="navigation" class="w-3 h-3 mr-1"></i> 點擊開啟導航</div>
                            </div>`;
                    }
                });
            }
            lucide.createIcons(); // 重新渲染 Icon
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tabName).classList.add('active');
            lucide.createIcons();
        }

        function convertCurrency() {
            const jpy = document.getElementById('jpyInput').value;
            document.getElementById('twdResult').innerText = 'TWD $ ' + Math.round(jpy * 0.21);
        }

        window.onload = function() {
            showTab('plan');
            filterDate('4/21');
        };
    </script>
</body>
</html>
