<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friends in Tokyo</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.47/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #F7F7F5; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-card { 
            background: #F7F7F5; 
            border-top-left-radius: 30px; 
            border-top-right-radius: 30px; 
            margin-top: -30px; 
            position: relative; 
            z-index: 10; 
            padding: 24px 20px; 
            min-height: calc(100vh - 220px);
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        [v-cloak] { display: none !important; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="max-w-[500px] mx-auto min-h-screen relative shadow-2xl">
        
        <div class="relative h-[250px] w-full overflow-hidden">
            <img src="Tokyo trip web banner.png" class="w-full h-full object-cover">
            
            <div class="absolute bottom-12 right-4 flex gap-2 glass p-2 shadow-xl border border-white/50">
                <button v-for="t in [{id:'plan',i:'map'},{id:'info',i:'info'},{id:'shop',i:'shopping-basket'},{id:'money',i:'banknote'}]" 
                        @click="tab = t.id" 
                        :class="tab === t.id ? 'bg-[#FF6B35] text-white' : 'text-gray-500'" 
                        class="p-3 rounded-xl transition-all active:scale-90">
                    <i :data-lucide="t.i" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <main class="main-card">
            
            <div v-if="tab === 'plan'">
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl mb-6 shadow-sm border border-gray-100">
                    <div class="flex items-center text-gray-700 font-bold"><i data-lucide="sun" class="text-yellow-400 mr-2"></i> Tokyo Today</div>
                    <span class="text-2xl font-light">18°C</span>
                </div>

                <div class="flex overflow-x-auto gap-4 mb-8 hide-scroll py-1">
                    <div v-for="d in dates" @click="selDate = d.val"
                         :class="selDate === d.val ? 'bg-[#FF6B35] text-white shadow-lg' : 'bg-white text-gray-400'"
                         class="flex-shrink-0 w-14 h-20 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all border border-gray-50">
                        <span class="text-[10px] font-bold uppercase tracking-tighter">{{d.day}}</span>
                        <span class="text-xl font-black">{{d.num}}</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div v-for="(item, idx) in filteredPlan" :key="idx">
                        <div v-if="item.cat === '航班'" class="bg-slate-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                            <div class="flex justify-between items-center relative z-10">
                                <div class="text-center"><div class="text-3xl font-black">TPE</div><div class="text-xs opacity-50">13:00</div></div>
                                <div class="flex flex-col items-center opacity-40"><i data-lucide="plane" class="w-5 h-5 text-[#FF6B35]"></i><div class="w-16 h-[1px] bg-white mt-1"></div></div>
                                <div class="text-center"><div class="text-3xl font-black">NRT</div><div class="text-xs opacity-50">17:15</div></div>
                            </div>
                            <div class="mt-4 pt-4 border-t border-white/10 text-[10px] uppercase tracking-widest opacity-60">CX450 | 國泰航空</div>
                        </div>

                        <div v-else class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50" @click="goMap(item.addr)">
                            <div class="flex justify-between mb-1">
                                <span class="text-[10px] bg-[#E8F0E6] text-[#4A5D4E] px-2 py-1 rounded font-black uppercase">{{item.cat}}</span>
                                <span class="text-xs text-gray-400 font-mono">{{item.time}}</span>
                            </div>
                            <h3 class="font-bold text-lg text-gray-800">{{item.name}}</h3>
                            <div class="mt-3 flex items-center text-blue-500 text-xs font-bold"><i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> 開啟地圖導航</div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="tab === 'info'" class="space-y-4">
                <div class="bg-[#D1E8ED] p-6 rounded-[2rem] shadow-inner">
                    <div class="font-black text-blue-900 mb-4 flex items-center uppercase tracking-wider text-sm"><i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> JPY TO TWD (0.21)</div>
                    <input type="number" v-model="jpy" placeholder="日幣金額" class="w-full p-4 rounded-2xl border-none text-xl font-bold shadow-sm focus:ring-2 ring-[#FF6B35]">
                    <div class="text-center font-black text-3xl text-blue-900 mt-4">TWD $ {{ Math.round(jpy * 0.21) }}</div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                    <h2 class="font-black text-lg text-gray-800 mb-2">KOMACHI 住宿</h2>
                    <p class="text-sm text-gray-500 leading-relaxed mb-4">5 Chome-9-3 Higashinippori, Tokyo</p>
                    <div class="bg-gray-50 p-4 rounded-xl text-xs text-gray-400 space-y-1">
                        <p>• 4/21-26: Elmo, Potato, Yifan</p>
                        <p>• 4/22-26: Avon</p>
                        <p>• 4/22-24: Moss</p>
                    </div>
                </div>
            </div>
        </main>

        <button class="fixed bottom-6 right-6 w-14 h-14 bg-[#FF6B35] text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <script>
        // 確保 Vue 載入後才執行
        const init = () => {
            const { createApp, ref, computed, onMounted, updated } = Vue;
            createApp({
                setup() {
                    const tab = ref('plan');
                    const selDate = ref('4/21');
                    const jpy = ref('');
                    const dates = [
                        {val:'4/21', day:'Mon', num:'21'},
                        {val:'4/22', day:'Tue', num:'22'},
                        {val:'4/23', day:'Wed', num:'23'},
                        {val:'4/24', day:'Thu', num:'24'},
                        {val:'4/25', day:'Fri', num:'25'},
                        {val:'4/26', day:'Sat', num:'26'}
                    ];
                    const plans = [
                        {date:'4/21', cat:'航班', name:'CX450'},
                        {date:'4/21', cat:'住宿', name:'KOMACHI Check-in', addr:'116-0014 Tokyo, Arakawa City, Higashinippori, 5 Chome-9-3'},
                        {date:'4/24', cat:'美食', name:'Den Kushi Flori (午餐)', time:'12:00', addr:'日本〒150-0001 Tokyo, Shibuya, Jingumae, 5 Chome-46-7'}
                    ];
                    const filteredPlan = computed(() => plans.filter(p => p.date === selDate.value));
                    const goMap = (a) => a && window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(a));
                    const draw = () => { if(window.lucide) lucide.createIcons(); };
                    onMounted(draw);
                    updated(draw);
                    return { tab, selDate, jpy, dates, filteredPlan, goMap };
                }
            }).mount('#app');
        };
        // 延遲執行以確保所有套件到位
        window.addEventListener('load', init);
    </script>
</body>
</html>
