<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends in Tokyo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #F7F7F5; margin: 0; font-family: sans-serif; }
        .main-card { background: #F7F7F5; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 10; padding: 24px 20px; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border-radius: 20px; }
        .tab-btn.active { background-color: #FF6B35; color: white; }
    </style>
</head>
<body>
    <div class="max-w-[500px] mx-auto min-h-screen relative">
        <div class="relative h-[250px] w-full overflow-hidden">
            <img src="Tokyo trip web banner.png" class="w-full h-full object-cover">
            <div class="absolute bottom-12 right-4 flex gap-2 glass p-2 shadow-xl border border-white/50">
                <button onclick="showTab('plan')" id="btn-plan" class="tab-btn active p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="map"></i></button>
                <button onclick="showTab('info')" id="btn-info" class="tab-btn p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="info"></i></button>
                <button onclick="showTab('money')" id="btn-money" class="tab-btn p-3 rounded-xl text-gray-500 transition-all"><i data-lucide="banknote"></i></button>
            </div>
        </div>

        <main class="main-card shadow-2xl">
            <div id="content-plan" class="tab-content">
                <div class="flex items-center justify-between bg-white p-4 rounded-2xl mb-6 shadow-sm border border-gray-100">
                    <div class="flex items-center text-gray-700 font-bold"><i data-lucide="sun" class="text-yellow-400 mr-2"></i> Tokyo Today</div>
                    <span class="text-2xl font-light">18°C</span>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-slate-800 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-center relative z-10">
                            <div class="text-center"><div class="text-2xl font-black">TPE</div><div class="text-xs opacity-50">13:00</div></div>
                            <i data-lucide="plane" class="text-[#FF6B35]"></i>
                            <div class="text-center"><div class="text-2xl font-black">NRT</div><div class="text-xs opacity-50">17:15</div></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-white/10 text-[10px] opacity-60">CX450 | 國泰航空</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100" onclick="window.open('https://www.google.com/maps/search/KOMACHI+Tokyo')">
                        <div class="flex justify-between mb-1">
                            <span class="text-[10px] bg-[#E8F0E6] text-[#4A5D4E] px-2 py-1 rounded font-black">住宿</span>
                            <span class="text-xs text-gray-400">18:30</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800">KOMACHI Check-in</h3>
                        <p class="text-xs text-gray-400 mt-1">5 Chome-9-3 Higashinippori</p>
                    </div>
                </div>
            </div>

            <div id="content-info" class="tab-content hidden space-y-4">
                <div class="bg-[#D1E8ED] p-6 rounded-[2rem] shadow-inner">
                    <div class="font-black text-blue-900 mb-2 uppercase text-sm">匯率換算 (0.21)</div>
                    <input type="number" id="jpyInput" oninput="convertCurrency()" placeholder="輸入日幣" class="w-full p-4 rounded-2xl border-none text-xl font-bold shadow-sm">
                    <div id="twdResult" class="text-center font-black text-3xl text-blue-900 mt-4">TWD $ 0</div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                    <h2 class="font-black text-lg text-gray-800 mb-2">住宿名單</h2>
                    <div class="text-xs text-gray-400 space-y-1">
                        <p>• 4/21-26: Elmo, Potato, Yifan</p>
                        <p>• 4/22-26: Avon</p>
                        <p>• 4/22-24: Moss</p>
                    </div>
                </div>
            </div>

            <div id="content-money" class="tab-content hidden py-20 text-center text-gray-300">
                <i data-lucide="package" class="mx-auto mb-2 w-12 h-12"></i>
                <p>功能開發中</p>
            </div>
        </main>

        <button class="fixed bottom-6 right-6 w-14 h-14 bg-[#FF6B35] text-white rounded-full shadow-2xl flex items-center justify-center">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <script>
        // 切換分頁的功能
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + tabName).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-[#FF6B35]', 'text-white'));
            const activeBtn = document.getElementById('btn-' + tabName);
            activeBtn.classList.add('active', 'bg-[#FF6B35]', 'text-white');
        }

        // 匯率換算
        function convertCurrency() {
            const jpy = document.getElementById('jpyInput').value;
            const twd = Math.round(jpy * 0.21);
            document.getElementById('twdResult').innerText = 'TWD $ ' + twd;
        }

        // 初始化圖示
        window.onload = function() {
            lucide.createIcons();
            showTab('plan'); // 預設顯示行程
        };
    </script>
</body>
</html>
