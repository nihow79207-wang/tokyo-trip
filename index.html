<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends in Tokyo | 行程助手</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.47/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #F7F7F5; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; }
        .main-content {
            background-color: #F7F7F5;
            border-radius: 30px 30px 0 0;
            margin-top: -30px;
            position: relative;
            z-index: 10;
            padding: 20px;
            min-height: 500px;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border-radius: 16px; }
        .hay-accent { background-color: #FF6B35; color: white; }
    </style>
</head>
<body>
    <div id="app" class="app-container shadow-inner">
        <div class="relative h-[250px] w-full bg-gray-200">
            <img src="Tokyo trip web banner.png" class="w-full h-full object-cover">
            
            <div class="absolute bottom-12 right-4 flex gap-2 glass p-2 shadow-xl">
                <button @click="tab = 'plan'" :class="tab==='plan'?'hay-accent':'text-gray-500'" class="p-3 rounded-xl transition"><i data-lucide="map"></i></button>
                <button @click="tab = 'info'" :class="tab==='info'?'hay-accent':'text-gray-500'" class="p-3 rounded-xl transition"><i data-lucide="info"></i></button>
                <button @click="tab = 'money'" :class="tab==='money'?'hay-accent':'text-gray-500'" class="p-3 rounded-xl transition"><i data-lucide="banknote"></i></button>
            </div>
        </div>

        <main class="main-content">
            
            <div v-if="tab === 'plan'">
                <div class="flex overflow-x-auto gap-4 mb-6 hide-scroll py-2">
                    <div v-for="d in ['4/21','4/22','4/23','4/24','4/25','4/26']" 
                         @click="selDate = d"
                         :class="selDate === d ? 'bg-[#FF6B35] text-white shadow' : 'bg-white text-gray-400'"
                         class="flex-shrink-0 w-14 h-20 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition shadow-sm border border-gray-50">
                        <span class="text-xs">Day</span>
                        <span class="text-xl font-bold">{{d.split('/')[1]}}</span>
                    </div>
                </div>

                <div v-if="selDate === '4/21'" class="space-y-4">
                    <div class="bg-slate-800 text-white p-5 rounded-3xl shadow-lg relative overflow-hidden">
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-center"><div class="text-2xl font-bold">TPE</div><div class="text-xs opacity-60">13:00</div></div>
                            <i data-lucide="plane" class="text-[#FF6B35]"></i>
                            <div class="text-center"><div class="text-2xl font-bold">NRT</div><div class="text-xs opacity-60">17:15</div></div>
                        </div>
                        <div class="text-xs border-t border-white/10 pt-3 opacity-80">CX450 | 桃園 → 成田</div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer" @click="goMap('KOMACHI 116-0014')">
                        <div class="font-bold">KOMACHI Check-in</div>
                        <div class="text-xs text-gray-400 mt-1">地址: 5 Chome-9-3 Higashinippori | 點擊導航</div>
                    </div>
                </div>

                <div v-if="selDate === '4/24'" class="space-y-4">
                     <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 cursor-pointer" @click="goMap('Den Kushi Flori')">
                        <div class="flex justify-between text-xs text-gray-400 mb-1"><span>美食</span><span>12:00</span></div>
                        <div class="font-bold text-lg">Den Kushi Flori (午餐)</div>
                        <div class="text-xs text-gray-500 mt-1">Elmo, Potato, Avon | 點擊導航</div>
                    </div>
                </div>
            </div>

            <div v-if="tab === 'info'" class="space-y-4">
                <div class="bg-[#D1E8ED] p-6 rounded-3xl">
                    <div class="font-bold mb-3 flex items-center text-blue-950"><i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> 匯率 (0.21)</div>
                    <input type="number" v-model="jpy" placeholder="輸入日幣 JPY" class="w-full p-4 rounded-xl border-none text-xl mb-3 shadow-sm">
                    <div class="text-center font-bold text-2xl text-blue-900 mt-2">約 TWD $ {{ Math.round(jpy * 0.21) }}</div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <div class="font-bold text-lg mb-2">住宿：KOMACHI</div>
                    <div class="text-xs text-gray-400 border-t pt-3">4/21-26: Elmo, Potato, Yifan<br>4/22-26: Avon<br>4/22-24: Moss</div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-6 right-6 w-14 h-14 bg-[#FF6B35] text-white rounded-full shadow-2xl flex items-center justify-center">
            <i data-lucide="plus"></i>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, updated } = Vue;
        createApp({
            setup() {
                const tab = ref('plan');
                const selDate = ref('4/21');
                const jpy = ref('');
                const goMap = (a) => window.open('http://googleusercontent.com/maps.google.com/4' + encodeURIComponent(a));
                const icons = () => lucide.createIcons();
                onMounted(icons);
                updated(icons);
                return { tab, selDate, jpy, goMap };
            }
        }).mount('#app');
    </script>
</body>
</html>
